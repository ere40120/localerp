                    <td style={{...S2.td,textAlign:"right"}}>{fmt(e.oldPrice)}</td>
                    <td style={{...S2.td,textAlign:"right",fontWeight:600}}>{fmt(e.newPrice)}</td>
                    <td style={{...S2.td,textAlign:"right",fontWeight:600,color:diff>0?"#c62828":"#2e7d32"}}>{diff>0?"+":""}{fmt(diff)}</td>
                    <td style={{...S2.td,color:"#888",fontSize:12}}>{e.memo||"-"}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  };

  // ---- 카테고리/회사 관리 탭 ----
  const renderCatMgmt = () => {
    const tree = {};
    categories.forEach(c => {
      if(!tree[c.cat1]) tree[c.cat1]={};
      if(!tree[c.cat1][c.cat2]) tree[c.cat1][c.cat2]=[];
      if(c.cat3) tree[c.cat1][c.cat2].push(c);
    });
    const catSel = categories.find(c=>c.id===catForm.catId)||{};
    return (
      <div>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <button style={{...S2.tab(catMgmtView==="category"),borderRadius:7}} onClick={()=>setCatMgmtView("category")}>🗂️ 카테고리 관리</button>
          <button style={{...S2.tab(catMgmtView==="company"),borderRadius:7}} onClick={()=>setCatMgmtView("company")}>🏢 회사 관리</button>
        </div>
        {catMgmtView==="category" && (
          <div>
            <div style={{...S.card,padding:12,background:"#f0f4ff",marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:13,color:"#1a237e",marginBottom:8}}>+ 카테고리 추가</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <input style={{...S2.inp,flex:1,minWidth:90}} placeholder="1차 카테고리*" value={catForm.cat1} onChange={e=>setCatForm(p=>({...p,cat1:e.target.value}))}/>
                <input style={{...S2.inp,flex:1,minWidth:90}} placeholder="2차 카테고리" value={catForm.cat2} onChange={e=>setCatForm(p=>({...p,cat2:e.target.value}))}/>
                <input style={{...S2.inp,flex:1,minWidth:90}} placeholder="3차 카테고리 (선택)" value={catForm.cat3} onChange={e=>setCatForm(p=>({...p,cat3:e.target.value}))}/>
                <button style={{...S2.addBtn,padding:"7px 14px"}} onClick={()=>{
                  if(!catForm.cat1){alert("1차 카테고리를 입력하세요.");return;}
                  const id=genCatId();
                  setCategories(p=>[...p,{id,cat1:catForm.cat1.trim(),cat2:catForm.cat2.trim()||"",cat3:catForm.cat3.trim()||""}]);
                  setCatForm({cat1:"",cat2:"",cat3:""});
                }}>추가</button>
              </div>
            </div>
            {categories.length===0&&<div style={{...S.card,padding:20,textAlign:"center",color:"#aaa"}}>카테고리가 없습니다. 위에서 추가하세요.</div>}
            {[...new Set(categories.map(c=>c.cat1))].filter(Boolean).map(c1=>{
              const c1open=catMgmtOpen[c1];
              const c1items=categories.filter(c=>c.cat1===c1);
              return (
                <div key={c1} style={{marginBottom:8,border:"1px solid #e0e4f0",borderRadius:8,overflow:"hidden"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"linear-gradient(90deg,#1a237e,#283593)",color:"#fff",cursor:"pointer"}}
                    onClick={()=>setCatMgmtOpen(p=>({...p,[c1]:!p[c1]}))}>
                    <span>{c1open?"▼":"▶"}</span>
                    <span style={{fontWeight:700,flex:1,fontSize:15}}>{c1}</span>
                    <span style={{fontSize:12,opacity:0.8}}>{c1items.length}개</span>
                    <button style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:5,padding:"3px 8px",cursor:"pointer",fontSize:11}}
                      onClick={e=>{e.stopPropagation();if(window.confirm(`'${c1}' 전체 삭제할까요?`)){setCategories(p=>p.filter(c=>c.cat1!==c1));}}}>전체 삭제</button>
                  </div>
                  {c1open && (
                    <div style={{padding:"8px 14px"}}>
                      {c1items.map((c,ci)=>(
                        <div key={c.id}
                          draggable
                          onDragStart={e=>{e.dataTransfer.effectAllowed="move";setCatDragState({c1,fromIdx:ci,toIdx:ci});}}
                          onDragOver={e=>{e.preventDefault();if(catDragState.c1===c1&&catDragState.toIdx!==ci)setCatDragState(p=>({...p,toIdx:ci}));}}
                          onDrop={e=>{e.preventDefault();if(catDragState.c1!==c1||catDragState.fromIdx==null||catDragState.fromIdx===ci)return;const arr=[...categories];const ids=c1items.map(x=>x.id);const gi=arr.findIndex(x=>x.id===ids[catDragState.fromIdx]);const gj=arr.findIndex(x=>x.id===ids[ci]);if(gi===-1||gj===-1)return;const[mv]=arr.splice(gi,1);arr.splice(gj,0,mv);setCategories(arr);setCatDragState({c1:null,fromIdx:null,toIdx:null});}}
                          onDragEnd={()=>setCatDragState({c1:null,fromIdx:null,toIdx:null})}
                          style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f4f5f7",opacity:catDragState.c1===c1&&catDragState.fromIdx===ci?0.4:1,outline:catDragState.c1===c1&&catDragState.toIdx===ci&&catDragState.fromIdx!==ci?"2px dashed #1a237e":"none",transition:"opacity 0.15s"}}>
                          {catEditId===c.id ? (<>
                            <input style={{...S2.inp,flex:1,minWidth:80}} placeholder="2차" value={catEditForm.cat2||""} onChange={e=>setCatEditForm(p=>({...p,cat2:e.target.value}))}/>
                            <input style={{...S2.inp,flex:1,minWidth:80}} placeholder="3차(선택)" value={catEditForm.cat3||""} onChange={e=>setCatEditForm(p=>({...p,cat3:e.target.value}))}/>
                            <button style={S2.iconBtn("#2e7d32")} onClick={()=>{setCategories(p=>p.map(x=>x.id===c.id?{...x,cat2:catEditForm.cat2||"",cat3:catEditForm.cat3||""}:x));setCatEditId(null);}}>✔저장</button>
                            <button style={S2.iconBtn("#999")} onClick={()=>setCatEditId(null)}>✖</button>
                          </>) : (<>
                            <span style={{cursor:"grab",color:"#ccc",fontSize:18,userSelect:"none",lineHeight:1}} title="드래그로 순서 변경">⠿</span>
                            <span style={{flex:1,fontSize:13}}>{c.cat2||"(없음)"}{c.cat3&&<span style={{color:"#6a1b9a",marginLeft:6}}>▶ {c.cat3}</span>}</span>
                            <span style={{fontSize:11,color:"#aaa"}}>{c.id}</span>
                            <button style={S2.iconBtn("#1565c0")} onClick={()=>{setCatEditId(c.id);setCatEditForm({cat2:c.cat2,cat3:c.cat3});}}>편집</button>
                            <button style={S2.iconBtn("#c62828")} onClick={()=>{if(window.confirm("삭제할까요?"))setCategories(p=>p.filter(x=>x.id!==c.id));}}>삭제</button>
                          </>)}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
        {catMgmtView==="company" && (
          <div>
            <div style={{...S.card,padding:12,background:"#f0f4ff",marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:13,color:"#1a237e",marginBottom:8}}>+ 회사 추가</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <input style={{...S2.inp,flex:2,minWidth:130}} placeholder="회사명*" value={compForm.name} onChange={e=>setCompForm(p=>({...p,name:e.target.value}))}/>
                <input style={{...S2.inp,flex:3,minWidth:150}} placeholder="메모 (선택)" value={compForm.memo} onChange={e=>setCompForm(p=>({...p,memo:e.target.value}))}/>
                <button style={{...S2.addBtn,padding:"7px 14px"}} onClick={()=>{
                  if(!compForm.name){alert("회사명을 입력하세요.");return;}
                  const id=genCoId();
                  setCompanies(p=>[...p,{id,name:compForm.name.trim(),memo:compForm.memo.trim()}]);
                  setCompForm({name:"",memo:""});
                }}>추가</button>
              </div>
            </div>
            {companies.length===0&&<div style={{...S.card,padding:20,textAlign:"center",color:"#aaa"}}>등록된 회사가 없습니다. 위에서 추가하세요.</div>}
            {companies.map(co=>(
              <div key={co.id} style={{...S.card,marginBottom:6,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
                {compEditId===co.id ? (<>
                  <input style={{...S2.inp,flex:2}} value={compEditForm.name||""} onChange={e=>setCompEditForm(p=>({...p,name:e.target.value}))}/>
                  <input style={{...S2.inp,flex:3}} placeholder="메모" value={compEditForm.memo||""} onChange={e=>setCompEditForm(p=>({...p,memo:e.target.value}))}/>
                  <button style={S2.iconBtn("#2e7d32")} onClick={()=>{setCompanies(p=>p.map(x=>x.id===co.id?{...x,name:compEditForm.name,memo:compEditForm.memo}:x));setCompEditId(null);}}>✔저장</button>
                  <button style={S2.iconBtn("#999")} onClick={()=>setCompEditId(null)}>✖</button>
                </>) : (<>
                  <span style={{fontSize:12,color:"#aaa",minWidth:50}}>{co.id}</span>
                  <span style={{fontWeight:700,flex:2,fontSize:14}}>🏢 {co.name}</span>
                  <span style={{color:"#888",fontSize:12,flex:3}}>{co.memo||""}</span>
                  <button style={S2.iconBtn("#1565c0")} onClick={()=>{setCompEditId(co.id);setCompEditForm({name:co.name,memo:co.memo});}}>편집</button>
                  <button style={S2.iconBtn("#c62828")} onClick={()=>{if(window.confirm("삭제할까요?"))setCompanies(p=>p.filter(x=>x.id!==co.id));}}>삭제</button>
                </>)}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,color:"#1a1a2e",marginBottom:16}}>원가계산</h2>
      <div style={{marginBottom:16,display:"flex",flexWrap:"wrap",gap:4}}>
        <button style={S2.tab(tab==="catmgmt")} onClick={()=>setTab("catmgmt")}>🏷️ 카테고리/회사</button>
        <button style={S2.tab(tab==="materials")} onClick={()=>setTab("materials")}>원자재 관리</button>
        <button style={S2.tab(tab==="processing")} onClick={()=>setTab("processing")}>가공비 관리</button>
        <button style={S2.tab(tab==="products")} onClick={()=>setTab("products")}>완제품 원가</button>
        <button style={S2.tab(tab==="history")} onClick={()=>setTab("history")}>가격변동 이력</button>
      </div>
      {tab==="catmgmt"&&renderCatMgmt()}
      {tab==="materials"&&renderMaterials()}
      {tab==="processing"&&renderProcessing()}
      {tab==="products"&&renderProducts()}
      {tab==="history"&&renderHistory()}
    </div>
  );
}
// ===================== 원가계산 모듈 끝 =====================

function App({user, localMode}) {
  const [menu,setMenu]=useState("dashboard");
  const [menuOrder,setMenuOrder]=usePersist("menuOrder",ALL_MENUS.map(m=>m.id));
  const [hiddenMenus,setHiddenMenus]=usePersist("hiddenMenus",[]);

  useEffect(()=>{
    const allIds=ALL_MENUS.map(m=>m.id);
    const missing=allIds.filter(id=>!menuOrder.includes(id));
    if(missing.length>0){setMenuOrder(prev=>[...prev,...missing]);}
  },[menuOrder]);
  const [myBiz,setMyBiz]=usePersist("myBiz",INIT_BIZ);
  const [products,setProducts]=usePersist("products",INIT_PRODUCTS);
  const [partnerPrices,setPartnerPrices]=usePersist("partnerPrices",INIT_PARTNER_PRICES);
  const [vouchers,setVouchers,loadVouchYear,vouchLoadedYears]=useChunkedPersist("vouchers","date",INIT_VOUCHERS);
  const [accounts]=useState(INIT_ACCOUNTS);
  const [partners,setPartners]=usePersist("partners",INIT_PARTNERS);
  const [statements,setStatements,loadStmtYear,stmtLoadedYears]=useChunkedPersist("statements","date",INIT_STATEMENTS);
  const [taxInvoices,setTaxInvoices,loadTaxYear,taxLoadedYears]=useChunkedPersist("taxInvoices","issueDate",INIT_TAXINVOICES);
  const [autoBackup,setAutoBackup]=usePersist("autoBackup",true);
  const [lastAutoBackup,setLastAutoBackup]=usePersist("lastAutoBackup","");
  const [receivables,setReceivables]=usePersist("receivables",[]);
  const [materials,setMaterials]=usePersist("materials",INIT_MATERIALS);
  const [costProducts,setCostProducts]=usePersist("costProducts",INIT_COST_PRODUCTS);
  const [processingCosts,setProcessingCosts]=usePersist("processingCosts",INIT_PROCESSING_COSTS);
  const [priceHistory,setPriceHistory]=usePersist("priceHistory",INIT_PRICE_HISTORY);
  const [categories,setCategories]=usePersist("categories",INIT_CATEGORIES);
  const [companies,setCompanies]=usePersist("companies",INIT_COMPANIES);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  const autoBackupRef=useRef({partners,vouchers,statements,taxInvoices,products,partnerPrices,myBiz,menuOrder,hiddenMenus});
  useEffect(()=>{autoBackupRef.current={partners,vouchers,statements,taxInvoices,products,partnerPrices,myBiz,menuOrder,hiddenMenus};},[partners,vouchers,statements,taxInvoices,products,partnerPrices,myBiz,menuOrder,hiddenMenus]);
  const lastAutoBackupRef=useRef(lastAutoBackup);
  useEffect(()=>{lastAutoBackupRef.current=lastAutoBackup;},[lastAutoBackup]);

  useEffect(()=>{
    if(!autoBackup)return;
    const check=async()=>{
      const n=new Date();const h=n.getHours();const m=n.getMinutes();
      if(h===0&&m<=5){
        const today=todayStr();
        const last=lastAutoBackupRef.current;
        const lastDate=last?new Date(last).toLocaleDateString("sv-SE"):"";
        if(lastDate!==today){
          let ts;
          if(localMode){ts=doAutoBackup(autoBackupRef.current);}
          else{ts=await doCloudBackup(autoBackupRef.current);}
          if(ts){lastAutoBackupRef.current=ts;setLastAutoBackup(ts);}
        }
      }
    };
    const iv=setInterval(check,60000);
    return ()=>clearInterval(iv);
  },[autoBackup,localMode]);

  const page=()=>{switch(menu){
    case "dashboard": return <Dashboard vouchers={vouchers} accounts={accounts} statements={statements} taxInvoices={taxInvoices}/>;
    case "statement": return <StatementPage statements={statements} setStatements={setStatements} partners={partners} myBiz={myBiz} products={products} partnerPrices={partnerPrices} loadYear={loadStmtYear} loadedYears={stmtLoadedYears}/>;
    case "taxinvoice": return <TaxInvoicePage taxInvoices={taxInvoices} setTaxInvoices={setTaxInvoices} partners={partners} myBiz={myBiz} products={products} partnerPrices={partnerPrices} loadYear={loadTaxYear} loadedYears={taxLoadedYears}/>;
    case "voucher": return <VoucherEntry vouchers={vouchers} setVouchers={setVouchers} accounts={accounts} partners={partners} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "journal": return <Journal vouchers={vouchers} accounts={accounts} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "ledger": return <Ledger vouchers={vouchers} accounts={accounts} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "trial": return <TrialBalance vouchers={vouchers} accounts={accounts} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "bs": return <BalanceSheet vouchers={vouchers} accounts={accounts} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "is": return <IncomeStatement vouchers={vouchers} accounts={accounts} loadYear={loadVouchYear} loadedYears={vouchLoadedYears}/>;
    case "partners": return <Partners partners={partners} setPartners={setPartners}/>;
    case "receivables": return <ReceivablesPage statements={statements} partners={partners} receivables={receivables} setReceivables={setReceivables}/>;
    case "accounts": return <AccountsMgmt accounts={accounts}/>;
    case "products": return <ProductMgmt products={products} setProducts={setProducts}/>;
    case "partnerPrice": return <PartnerPricePage partners={partners} products={products} partnerPrices={partnerPrices} setPartnerPrices={setPartnerPrices}/>;
    case "costCalc": return <CostCalcPage materials={materials} setMaterials={setMaterials} costProducts={costProducts} setCostProducts={setCostProducts} processingCosts={processingCosts} setProcessingCosts={setProcessingCosts} priceHistory={priceHistory} setPriceHistory={setPriceHistory} categories={categories} setCategories={setCategories} companies={companies} setCompanies={setCompanies}/>;
    case "bizSettings": return <BizSettings myBiz={myBiz} setMyBiz={setMyBiz}/>;
    case "backup": return <BackupRestore partners={partners} vouchers={vouchers} statements={statements} taxInvoices={taxInvoices} products={products} partnerPrices={partnerPrices} myBiz={myBiz} menuOrder={menuOrder} hiddenMenus={hiddenMenus} setPartners={setPartners} setVouchers={setVouchers} setStatements={setStatements} setTaxInvoices={setTaxInvoices} setProducts={setProducts} setPartnerPrices={setPartnerPrices} setMyBiz={setMyBiz} setMenuOrder={setMenuOrder} setHiddenMenus={setHiddenMenus} autoBackup={autoBackup} setAutoBackup={setAutoBackup} lastAutoBackup={lastAutoBackup} setLastAutoBackup={setLastAutoBackup} localMode={localMode}/>;
    default: return <Dashboard vouchers={vouchers} accounts={accounts} statements={statements} taxInvoices={taxInvoices}/>;
  }};

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f4f5f7",fontFamily:"'Noto Sans KR',-apple-system,sans-serif"}}>
      <div className={"sidebar-overlay"+(sidebarOpen?" open":"")} onClick={()=>setSidebarOpen(false)}/>
      <Sidebar activeMenu={menu} setActiveMenu={setMenu} menuOrder={menuOrder} setMenuOrder={setMenuOrder} hiddenMenus={hiddenMenus} setHiddenMenus={setHiddenMenus} onClose={()=>setSidebarOpen(false)} isOpen={sidebarOpen}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div className="topbar">
          <button className="hamburger" onClick={()=>setSidebarOpen(true)}><Menu size={22}/></button>
          <span style={{fontSize:16,fontWeight:700,flex:1}}>LocalERP</span>
          <span style={{fontSize:11,opacity:0.7,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user&&user.email}</span>
          <button onClick={()=>{if(typeof __auth!=='undefined'&&__auth)__auth.signOut();else location.reload();}} style={{background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',borderRadius:6,padding:'4px 10px',fontSize:12,cursor:'pointer',marginLeft:6}}>로그아웃</button>
        </div>
        <div className="main-content" style={{flex:1,padding:"22px 26px",overflowX:"auto"}}>{page()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthRoot/>);
</script>
</body>
</html>
