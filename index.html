// ===================== 미수금 관리 =====================
const ReceivablesPage = ({statements, partners, receivables, setReceivables}) => {
  const todayStr = new Date().toISOString().slice(0,10);
  const emptyForm = {date:todayStr, partnerId:"", amount:"", memo:""};
  const [form, setForm] = useState(emptyForm);
  const [editId, setEditId] = useState(null);
  const [filterPartner, setFilterPartner] = useState("all");
  const [tab, setTab] = useState("summary");
  const [confirmDel, setConfirmDel] = useState(null);
  const [xlsImportModal, setXlsImportModal] = useState(false);
  const [xlsImportData, setXlsImportData] = useState([]);
  const [xlsImportError, setXlsImportError] = useState("");
  const [xlsImportMode, setXlsImportMode] = useState("append");
  const xlsFileRef = useRef(null);

  const fmt = n => Math.round(n||0).toLocaleString();

  // 거래처별 청구합계 (거래명세서 grandTotal 기준)
  const billingByPartner = useMemo(() => {
    const map = {};
    statements.forEach(s => {
      if (!map[s.partnerId]) map[s.partnerId] = 0;
      map[s.partnerId] += (s.grandTotal||0);
    });
    return map;
  }, [statements]);

  // 거래처별 입금합계
  const paymentByPartner = useMemo(() => {
    const map = {};
    receivables.forEach(r => {
      if (!map[r.partnerId]) map[r.partnerId] = 0;
      map[r.partnerId] += (r.amount||0);
    });
    return map;
  }, [receivables]);

  // 요약 행 (청구 또는 입금이 있는 거래처)
  const summaryRows = useMemo(() => {
    const ids = new Set([...Object.keys(billingByPartner), ...Object.keys(paymentByPartner)]);
    return Array.from(ids).map(id => {
      const p = partners.find(x => x.id === id);
      const billing = billingByPartner[id]||0;
      const payment = paymentByPartner[id]||0;
      return {id, name:p?.name||id, billing, payment, outstanding:billing-payment};
    }).sort((a,b) => b.outstanding - a.outstanding);
  }, [billingByPartner, paymentByPartner, partners]);

  const totalBilling = summaryRows.reduce((s,r)=>s+r.billing,0);
  const totalPayment = summaryRows.reduce((s,r)=>s+r.payment,0);
  const totalOutstanding = summaryRows.reduce((s,r)=>s+r.outstanding,0);

  // ── 엑셀 내보내기
  const handleExport = () => {
    const wb = XLSX.utils.book_new();
    // 입금 내역 시트
    const rows = [["입금일","거래처명","입금금액","메모"]];
    [...receivables].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r => {
      const p = partners.find(x=>x.id===r.partnerId);
      rows.push([r.date, p?.name||r.partnerId, r.amount||0, r.memo||""]);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:12},{wch:24},{wch:16},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, "입금내역");
    // 거래처별 현황 시트
    const rows2 = [["거래처명","청구합계","입금합계","미수금","입금률"]];
    summaryRows.forEach(r => {
      const rate = r.billing>0 ? Math.round(r.payment/r.billing*100) : 0;
      rows2.push([r.name, r.billing, r.payment, r.outstanding, rate+"%"]);
    });
    rows2.push(["합계", totalBilling, totalPayment, totalOutstanding, totalBilling>0?Math.round(totalPayment/totalBilling*100)+"%":"0%"]);
    const ws2 = XLSX.utils.aoa_to_sheet(rows2);
    ws2["!cols"] = [{wch:24},{wch:16},{wch:16},{wch:16},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws2, "거래처별현황");
    XLSX.writeFile(wb, "입금내역_내보내기.xlsx");
  };

  // ── 양식 다운로드
  const handleDownloadTemplate = () => {
    const wb = XLSX.utils.book_new();
    const rows = [
      ["입금일","거래처명","입금금액","메모"],
      ["2026-04-30","(주)예시거래처",1000000,"4월분 대금"],
      ["2026-04-30","(주)예시거래처2",500000,""],
    ];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:12},{wch:24},{wch:16},{wch:30}];
    XLSX.utils.book_append_sheet(wb, ws, "입금내역");
    XLSX.writeFile(wb, "입금내역_입력양식.xlsx");
  };

  // ── 엑셀 파일 읽기
  const handleXlsFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        if (!rows || rows.length < 2) { setXlsImportError("데이터가 없습니다."); setXlsImportData([]); return; }
        const headers = rows[0].map(h=>String(h).trim());
        const dateIdx = headers.findIndex(h=>h==="입금일");
        const nameIdx = headers.findIndex(h=>h==="거래처명");
        const amtIdx  = headers.findIndex(h=>h==="입금금액");
        const memoIdx = headers.findIndex(h=>h==="메모");
        if (dateIdx<0||nameIdx<0||amtIdx<0) { setXlsImportError("'입금일','거래처명','입금금액' 열이 필요합니다. 양식 파일을 사용해주세요."); setXlsImportData([]); return; }
        const errs = [];
        const parsed = [];
        rows.slice(1).forEach((row, ri) => {
          if (!row[dateIdx] && !row[nameIdx] && !row[amtIdx]) return;
          const dateVal = String(row[dateIdx]||"").trim();
          const nameVal = String(row[nameIdx]||"").trim();
          const amtRaw  = row[amtIdx];
          const memo    = memoIdx>=0 ? String(row[memoIdx]||"").trim() : "";
          if (!dateVal) { errs.push(`${ri+2}행: 입금일이 비어있습니다.`); return; }
          if (!nameVal) { errs.push(`${ri+2}행: 거래처명이 비어있습니다.`); return; }
          const amount = parseFloat(String(amtRaw).replace(/,/g,""));
          if (isNaN(amount)||amount<=0) { errs.push(`${ri+2}행: 입금금액이 올바르지 않습니다 (${amtRaw})`); return; }
          const partner = partners.find(p=>p.name===nameVal||p.id===nameVal);
          if (!partner) { errs.push(`${ri+2}행: 거래처 '${nameVal}'를 찾을 수 없습니다.`); return; }
          parsed.push({id:"REC"+Date.now()+ri, date:dateVal, partnerId:partner.id, amount, memo});
        });
        if (errs.length>0) { setXlsImportError(errs.slice(0,5).join("\n")+(errs.length>5?`\n...외 ${errs.length-5}건`:"")); setXlsImportData([]); return; }
        setXlsImportError("");
        setXlsImportData(parsed);
        setXlsImportModal(true);
      } catch(e) { setXlsImportError("파일 읽기 오류: "+e.message); setXlsImportData([]); }
    };
    reader.readAsBinaryString(file);
  };

  // ── 엑셀 가져오기 실행
  const handleXlsImport = () => {
    if (xlsImportMode==="replace") {
      setReceivables(xlsImportData);
    } else {
      setReceivables(prev => [...prev, ...xlsImportData]);
    }
    setXlsImportModal(false);
    setXlsImportData([]);
    setTab("history");
  };

  const handleSave = () => {
    if (!form.partnerId || !form.amount || !form.date) return;
    const amount = parseFloat(String(form.amount).replace(/,/g,''));
    if (isNaN(amount) || amount <= 0) return;
    if (editId) {
      setReceivables(prev => prev.map(r => r.id===editId ? {...r,...form,amount} : r));
      setEditId(null);
    } else {
      setReceivables(prev => [...prev, {id:"REC"+Date.now(), ...form, amount}]);
    }
    setForm(emptyForm);
  };

  const handleEdit = r => {
    setForm({date:r.date, partnerId:r.partnerId, amount:r.amount, memo:r.memo||""});

  const handleDelete = id => {
    setReceivables(prev => prev.filter(r => r.id!==id));

  const filteredHistory = useMemo(() => {

  const tabBtn = t => ({
    padding:"9px 18px", cursor:"pointer", fontWeight:tab===t?700:400,
    borderBottom:tab===t?"2px solid #1a237e":"2px solid transparent",
    color:tab===t?"#1a237e":"#666", background:"none", border:"none",
    borderBottom:tab===t?"2px solid #1a237e":"2px solid transparent", fontSize:14
  });

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>
      <h2 style={{fontSize:22,fontWeight:700,color:"#1a1a2e",marginBottom:18}}>미수금 관리</h2>

      <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>
        {[
          {label:"총 청구액",value:totalBilling,color:"#1565c0",bg:"#e3f2fd"},
          {label:"총 입금액",value:totalPayment,color:"#2e7d32",bg:"#e8f5e9"},
          {label:"총 미수금",value:totalOutstanding,color:totalOutstanding>0?"#c62828":"#2e7d32",bg:totalOutstanding>0?"#ffebee":"#e8f5e9"},
        ].map(c=>(
          <div key={c.label} style={{flex:"1 1 180px",background:"#fff",borderRadius:12,padding:"16px 20px",boxShadow:"0 1px 6px rgba(0,0,0,0.08)",borderLeft:"4px solid "+c.color}}>
            <div style={{fontSize:12,color:"#888",marginBottom:6}}>{c.label}</div>
            <div style={{fontSize:20,fontWeight:800,color:c.color}}>₩{fmt(c.value)}</div>
          </div>
        ))}
      </div>

      {/* 탭 영역 */}
      <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)",overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1px solid #eee",paddingLeft:8}}>
          <button style={tabBtn("summary")} onClick={()=>setTab("summary")}>거래처별 현황</button>
          <button style={tabBtn("input")} onClick={()=>{setTab("input");}}>입금 등록</button>
          <button style={tabBtn("history")} onClick={()=>setTab("history")}>입금 내역</button>
        </div>

        <div style={{padding:"20px 20px"}}>
          {/* ── 탭1: 거래처별 현황 ── */}
          {tab==="summary" && (
            <div>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
                <button onClick={handleExport}
                  style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",border:"1px solid #2e7d32",borderRadius:7,background:"#e8f5e9",cursor:"pointer",fontSize:12,color:"#2e7d32",fontWeight:600}}>
                  <Download size={13}/> 엑셀 내보내기
                </button>
              </div>
              {summaryRows.length===0 ? (
                <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}>
                  <div style={{fontSize:40,marginBottom:8}}>📋</div>
                  <div>거래명세서 또는 입금 내역이 없습니다.</div>
                  <div style={{fontSize:12,marginTop:4}}>거래명세서를 등록하거나 입금을 기록해주세요.</div>
                </div>
              ) : (
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:"#f5f7ff"}}>
                      {["거래처명","청구합계","입금합계","미수금","입금률"].map((h,i)=>(
                        <th key={h} style={{padding:"11px 14px",textAlign:i===0?"left":"right",borderBottom:"2px solid #e0e7ff",fontWeight:600,color:"#333",fontSize:12}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {summaryRows.map(r=>{
                      const rate = r.billing>0 ? Math.round(r.payment/r.billing*100) : (r.payment>0?999:0);
                      const rateDisp = rate>=999?"초과":rate+"%";
                      const rateColor = rate>=100?"#2e7d32":rate>=50?"#e65100":"#c62828";
                      const rateBg = rate>=100?"#e8f5e9":rate>=50?"#fff3e0":"#ffebee";
                      return (
                        <tr key={r.id} style={{borderBottom:"1px solid #f0f0f0"}} onMouseEnter={e=>e.currentTarget.style.background="#fafbff"} onMouseLeave={e=>e.currentTarget.style.background=""}>

                          <td style={{padding:"11px 14px",textAlign:"right",color:"#1565c0"}}>₩{fmt(r.billing)}</td>
                          <td style={{padding:"11px 14px",textAlign:"right",color:"#2e7d32"}}>₩{fmt(r.payment)}</td>
                          <td style={{padding:"11px 14px",textAlign:"right",fontWeight:700,color:r.outstanding>0?"#c62828":r.outstanding<0?"#6a1b9a":"#2e7d32"}}>
                            {r.outstanding!==0?"₩"+fmt(Math.abs(r.outstanding))+(r.outstanding<0?" (초과)":""):"₩0"}
                          </td>
                          <td style={{padding:"11px 14px",textAlign:"right"}}>
                            <span style={{background:rateBg,color:rateColor,padding:"2px 9px",borderRadius:12,fontSize:12,fontWeight:600}}>{rateDisp}</span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"#f5f7ff",fontWeight:700,fontSize:13}}>
                      <td style={{padding:"11px 14px"}}>합계</td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:"#1565c0"}}>₩{fmt(totalBilling)}</td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:"#2e7d32"}}>₩{fmt(totalPayment)}</td>
                      <td style={{padding:"11px 14px",textAlign:"right",color:totalOutstanding>0?"#c62828":"#2e7d32"}}>₩{fmt(totalOutstanding)}</td>
                      <td style={{padding:"11px 14px",textAlign:"right"}}>{totalBilling>0?Math.round(totalPayment/totalBilling*100):0}%</td>

                </table>

              <p style={{fontSize:11,color:"#bbb",marginTop:10,marginBottom:0}}>* 청구합계는 등록된 거래명세서 금액(부가세 포함) 기준입니다.</p>
            </div>

          {/* ── 탭2: 입금 등록 ── */}
          {tab==="input" && (
            <div style={{maxWidth:460}}>
              <h3 style={{fontSize:16,fontWeight:700,marginBottom:18,color:"#333"}}>{editId?"입금 내역 수정":"입금 등록"}</h3>
              <div style={{display:"grid",gap:16}}>
                <div>
                  <label style={{fontSize:12,color:"#555",marginBottom:5,display:"block",fontWeight:600}}>입금일 *</label>
                  <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                    style={{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:7,fontSize:13,boxSizing:"border-box"}}/>
                </div>
                <div>
                  <label style={{fontSize:12,color:"#555",marginBottom:5,display:"block",fontWeight:600}}>거래처 *</label>
                  <select value={form.partnerId} onChange={e=>setForm(f=>({...f,partnerId:e.target.value}))}
                    style={{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:7,fontSize:13,boxSizing:"border-box",background:"#fff"}}>
                    <option value="">-- 거래처 선택 --</option>
                    {partners.filter(p=>p.type==="매출처"||!p.type).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                    {partners.filter(p=>p.type&&p.type!=="매출처").length>0 && <>
                      <option disabled>── 매입처 ──</option>

                    </>}
                  </select>
                </div>
                <div>
                  <label style={{fontSize:12,color:"#555",marginBottom:5,display:"block",fontWeight:600}}>입금 금액 *</label>
                  <input type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
                    placeholder="0" min="0"
                    style={{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:7,fontSize:13,boxSizing:"border-box"}}/>
                  {form.amount && <div style={{fontSize:11,color:"#888",marginTop:3}}>₩{fmt(parseFloat(String(form.amount).replace(/,/g,''))||0)}</div>}
                </div>
                <div>
                  <label style={{fontSize:12,color:"#555",marginBottom:5,display:"block",fontWeight:600}}>메모</label>
                  <input type="text" value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))}
                    placeholder="예: 3월분 대금 입금"
                    style={{width:"100%",padding:"9px 11px",border:"1px solid #ddd",borderRadius:7,fontSize:13,boxSizing:"border-box"}}/>
                </div>
                {form.partnerId && billingByPartner[form.partnerId] !== undefined && (
                  <div style={{background:"#f5f7ff",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#555"}}>
                    <span style={{fontWeight:600}}>{partners.find(p=>p.id===form.partnerId)?.name}</span> 현황:&nbsp;
                    청구 <b style={{color:"#1565c0"}}>₩{fmt(billingByPartner[form.partnerId]||0)}</b> /
                    입금 <b style={{color:"#2e7d32"}}>₩{fmt(paymentByPartner[form.partnerId]||0)}</b> /
                    미수금 <b style={{color:"#c62828"}}>₩{fmt((billingByPartner[form.partnerId]||0)-(paymentByPartner[form.partnerId]||0))}</b>
                  </div>
                )}
                <div style={{display:"flex",gap:8,paddingTop:4}}>
                  <button onClick={handleSave}
                    disabled={!form.partnerId||!form.amount||!form.date}
                    style={{background:(!form.partnerId||!form.amount||!form.date)?"#ccc":"#1a237e",color:"#fff",border:"none",borderRadius:7,padding:"11px 28px",fontWeight:700,cursor:(!form.partnerId||!form.amount||!form.date)?"default":"pointer",fontSize:14}}>
                    {editId?"수정 저장":"입금 등록"}
                  </button>
                  {editId && (
                    <button onClick={()=>{setEditId(null);setForm(emptyForm);}}
                      style={{background:"#eee",color:"#333",border:"none",borderRadius:7,padding:"11px 18px",cursor:"pointer",fontSize:13}}>취소</button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ── 탭3: 입금 내역 ── */}
          {tab==="history" && (
            <div>
              <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
                <label style={{fontSize:12,color:"#555",fontWeight:600}}>거래처 필터</label>
                <select value={filterPartner} onChange={e=>setFilterPartner(e.target.value)}
                  style={{padding:"7px 11px",border:"1px solid #ddd",borderRadius:7,fontSize:12,background:"#fff"}}>
                  <option value="all">전체</option>
                  {partners.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
                <span style={{fontSize:12,color:"#aaa"}}>{filteredHistory.length}건</span>
                <div style={{marginLeft:"auto",display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button onClick={handleDownloadTemplate}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",border:"1px solid #ccc",borderRadius:7,background:"#fff",cursor:"pointer",fontSize:12,color:"#555"}}>
                    <Download size={13}/> 양식 다운로드
                  </button>
                  <button onClick={()=>{setXlsImportError("");xlsFileRef.current&&xlsFileRef.current.click();}}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",border:"1px solid #1565c0",borderRadius:7,background:"#e3f2fd",cursor:"pointer",fontSize:12,color:"#1565c0",fontWeight:600}}>
                    <Upload size={13}/> 엑셀 가져오기
                  </button>
                  <button onClick={handleExport}
                    style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",border:"1px solid #2e7d32",borderRadius:7,background:"#e8f5e9",cursor:"pointer",fontSize:12,color:"#2e7d32",fontWeight:600}}>
                    <Download size={13}/> 엑셀 내보내기
                  </button>
                  <input ref={xlsFileRef} type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={handleXlsFile}/>
                </div>
              </div>
              {xlsImportError && (
                <div style={{background:"#fff3f3",border:"1px solid #ffcdd2",borderRadius:7,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#c62828",whiteSpace:"pre-line"}}>
                  ⚠️ {xlsImportError}
                </div>
              )}
              {filteredHistory.length===0 ? (
                <div style={{textAlign:"center",padding:"40px 0",color:"#bbb"}}>
                  <div style={{fontSize:36,marginBottom:8}}>💳</div>
                  <div>입금 내역이 없습니다.</div>
                </div>
              ) : (
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead>
                    <tr style={{background:"#f5f7ff"}}>
                      {["입금일","거래처","입금금액","메모",""].map((h,i)=>(
                        <th key={i} style={{padding:"10px 12px",textAlign:i===2?"right":"left",borderBottom:"2px solid #e0e7ff",fontWeight:600,color:"#333",fontSize:12}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredHistory.map(r=>{
                      const p = partners.find(x=>x.id===r.partnerId);
                      return (
                        <tr key={r.id} style={{borderBottom:"1px solid #f0f0f0"}} onMouseEnter={e=>e.currentTarget.style.background="#fafbff"} onMouseLeave={e=>e.currentTarget.style.background=""}>
                          <td style={{padding:"10px 12px",color:"#555"}}>{r.date}</td>
                          <td style={{padding:"10px 12px",fontWeight:500}}>{p?.name||r.partnerId}</td>
                          <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:"#2e7d32"}}>₩{fmt(r.amount)}</td>
                          <td style={{padding:"10px 12px",color:"#888",fontSize:12}}>{r.memo||"-"}</td>
                          <td style={{padding:"10px 12px"}}>
                            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                              <button onClick={()=>handleEdit(r)} style={{background:"none",border:"1px solid #ddd",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"#444"}}>수정</button>
                              <button onClick={()=>setConfirmDel(r.id)} style={{background:"none",border:"1px solid #ffcdd2",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:11,color:"#c62828"}}>삭제</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr style={{background:"#f5f7ff",fontWeight:700}}>
                      <td colSpan={2} style={{padding:"10px 12px",fontSize:12}}>합계 ({filteredHistory.length}건)</td>
                      <td style={{padding:"10px 12px",textAlign:"right",color:"#2e7d32"}}>₩{fmt(filteredHistory.reduce((s,r)=>s+(r.amount||0),0))}</td>
                      <td colSpan={2}/>
                    </tr>
                  </tfoot>
                </table>
              )}
            </div>
          )}
        </div>
      </div>

      {/* 엑셀 가져오기 확인 모달 */}
      {xlsImportModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:"#fff",borderRadius:14,padding:"24px 28px 20px",maxWidth:520,width:"95%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:6}}>엑셀 가져오기</div>
            <p style={{color:"#666",fontSize:13,margin:"0 0 14px"}}>
              총 <b style={{color:"#1565c0"}}>{xlsImportData.length}건</b>의 입금 내역을 가져옵니다.
            </p>
            {/* 미리보기 */}
            <div style={{maxHeight:200,overflowY:"auto",border:"1px solid #e8e8e8",borderRadius:8,marginBottom:14}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#f5f7ff",position:"sticky",top:0}}>
                    <th style={{padding:"7px 10px",textAlign:"left",borderBottom:"1px solid #e0e0e0"}}>입금일</th>
                    <th style={{padding:"7px 10px",textAlign:"left",borderBottom:"1px solid #e0e0e0"}}>거래처명</th>
                    <th style={{padding:"7px 10px",textAlign:"right",borderBottom:"1px solid #e0e0e0"}}>입금금액</th>
                    <th style={{padding:"7px 10px",textAlign:"left",borderBottom:"1px solid #e0e0e0"}}>메모</th>
                  </tr>
                </thead>
                <tbody>
                  {xlsImportData.map((r,i)=>{
                    const p = partners.find(x=>x.id===r.partnerId);
                    return (
                      <tr key={i} style={{borderBottom:"1px solid #f5f5f5"}}>
                        <td style={{padding:"6px 10px"}}>{r.date}</td>
                        <td style={{padding:"6px 10px"}}>{p?.name||r.partnerId}</td>
                        <td style={{padding:"6px 10px",textAlign:"right",color:"#2e7d32",fontWeight:600}}>₩{Math.round(r.amount||0).toLocaleString()}</td>
                        <td style={{padding:"6px 10px",color:"#888"}}>{r.memo||"-"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* 가져오기 방식 */}
            <div style={{display:"flex",gap:12,marginBottom:18}}>
              {[{v:"append",label:"기존에 추가",desc:"현재 데이터에 추가로 입력합니다"},
                {v:"replace",label:"전체 교체",desc:"기존 입금 내역을 모두 지우고 새로 입력합니다"}
              ].map(opt=>(
                <label key={opt.v} style={{display:"flex",alignItems:"flex-start",gap:7,cursor:"pointer",flex:1,padding:"10px 12px",border:`2px solid ${xlsImportMode===opt.v?"#1a237e":"#e0e0e0"}`,borderRadius:8,background:xlsImportMode===opt.v?"#f5f7ff":"#fff"}}>
                  <input type="radio" value={opt.v} checked={xlsImportMode===opt.v} onChange={e=>setXlsImportMode(e.target.value)} style={{marginTop:2}}/>
                  <div>
                    <div style={{fontWeight:600,fontSize:13,color:xlsImportMode===opt.v?"#1a237e":"#333"}}>{opt.label}</div>
                    <div style={{fontSize:11,color:"#888",marginTop:2}}>{opt.desc}</div>
                  </div>
                </label>
              ))}
            </div>
            {xlsImportMode==="replace" && (
              <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:7,padding:"8px 12px",fontSize:12,color:"#e65100",marginBottom:14}}>
                ⚠️ 기존 입금 내역 <b>{receivables.length}건</b>이 모두 삭제됩니다.
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setXlsImportModal(false);setXlsImportData([]);}} style={{padding:"9px 18px",border:"1px solid #ddd",borderRadius:7,cursor:"pointer",background:"#fff",fontSize:13}}>취소</button>
              <button onClick={handleXlsImport} style={{padding:"9px 22px",border:"none",borderRadius:7,cursor:"pointer",background:"#1a237e",color:"#fff",fontWeight:700,fontSize:13}}>가져오기 실행</button>
            </div>
          </div>
        </div>
      )}

      {/* 삭제 확인 모달 */}
      {confirmDel && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:"#fff",borderRadius:14,padding:"28px 28px 20px",maxWidth:320,width:"90%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>입금 내역 삭제</div>
            <p style={{color:"#555",fontSize:13,margin:"0 0 20px"}}>이 입금 내역을 삭제하면 복구할 수 없습니다. 계속할까요?</p>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setConfirmDel(null)} style={{padding:"9px 18px",border:"1px solid #ddd",borderRadius:7,cursor:"pointer",background:"#fff",fontSize:13}}>취소</button>
              <button onClick={()=>handleDelete(confirmDel)} style={{padding:"9px 18px",border:"none",borderRadius:7,cursor:"pointer",background:"#c62828",color:"#fff",fontWeight:700,fontSize:13}}>삭제</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const AccountsMgmt = ({accounts}) => {
  const [exp,setExp]=useState(["자산","부채","자본","수익","비용"]);const grouped={};accounts.forEach(a=>{if(!grouped[a.category])grouped[a.category]={};if(!grouped[a.category][a.subcategory])grouped[a.category][a.subcategory]=[];grouped[a.category][a.subcategory].push(a);});const colors={자산:"#1565c0",부채:"#c62828",자본:"#2e7d32",수익:"#6a1b9a",비용:"#e65100"};

};

// ===================== 원가계산 모듈 v2 =====================
function CostCalcPage({materials, setMaterials, costProducts, setCostProducts,
                       processingCosts, setProcessingCosts,
                       priceHistory, setPriceHistory,
                       categories, setCategories,
                       companies, setCompanies}) {
  const [tab, setTab] = useState("materials"); // "materials"|"processing"|"products"|"history"|"catmgmt"

  const [priceChangeMemo, setPriceChangeMemo] = useState("");

  // ---- 가공비 상태 ----
  const [pcForm, setPcForm] = useState({id:"",name:"",unit:"",unitPrice:"",companyId:"",catId:""});
  const [pcViewMode, setPcViewMode] = useState("list");
  const [pcCatCmpView, setPcCatCmpView] = useState({});
  const [pcCatOpen, setPcCatOpen] = useState({});
  const [pcEdit, setPcEdit] = useState(null);
  const [pcEditForm, setPcEditForm] = useState({});
  const [pcHistOpen, setPcHistOpen] = useState(null);
  const [matDragIdx, setMatDragIdx] = useState(null);
  const [matDragOverIdx, setMatDragOverIdx] = useState(null);
  const [pcDragIdx, setPcDragIdx] = useState(null);
  const [pcDragOverIdx, setPcDragOverIdx] = useState(null);
  const [catDragState, setCatDragState] = useState({c1:null,fromIdx:null,toIdx:null});

  // ---- 카테고리/회사 헬퍼 ----
  const getCatById = (id) => categories.find(c=>c.id===id)||{cat1:"",cat2:"",cat3:""};
  const getCompById = (id) => companies.find(c=>c.id===id);
  const cat1List = [...new Set(categories.map(c=>c.cat1))].filter(Boolean);
  const cat2For = (c1) => [...new Set(categories.filter(c=>c.cat1===c1).map(c=>c.cat2))].filter(Boolean);
  const cat3For = (c1,c2) => [...new Set(categories.filter(c=>c.cat1===c1&&c.cat2===c2).map(c=>c.cat3))].filter(Boolean);
  const genCatId = () => "C"+String(categories.length+1).padStart(3,"0");
  const genCoId  = () => "CO"+String(companies.length+1).padStart(3,"0");

  // ---- 완제품 상태 ----
  const [cpForm, setCpForm] = useState({id:"",name:"",unit:"개",laborCost:"",packagingCost:"",marginRate:"",materials:[],processing:[]});
  const [cpEdit, setCpEdit] = useState(null);
  const [cpEditForm, setCpEditForm] = useState({});
  const [addingMat, setAddingMat] = useState(false);
  const [newMatRow, setNewMatRow] = useState({materialId:"",qty:""});
  const [addingPc, setAddingPc] = useState(false);
  const [newPcRow, setNewPcRow] = useState({processingId:"",qty:""});
  const [editAddingMat, setEditAddingMat] = useState(false);
  const [editNewMatRow, setEditNewMatRow] = useState({materialId:"",qty:""});
  const [editAddingPc, setEditAddingPc] = useState(false);
  const [editNewPcRow, setEditNewPcRow] = useState({processingId:"",qty:""});
  const [cpHistOpen, setCpHistOpen] = useState(null); // 완제품 이력 열린 id

  // ---- 가격 변경 헬퍼 ----
  const savePriceHistory = (kind, id, oldPrice, newPrice, memo) => {
    setPriceHistory(prev => {
      const cat = prev[kind] || {};
      const existing = cat[id] || [];
      return {...prev, [kind]: {...cat, [id]: [...existing, {date:todayStr(), oldPrice:Number(oldPrice), newPrice:Number(newPrice), memo:memo||""}]}};
    });
  };
  const updateMatPrice = (id, newPrice, memo) => {
    const mat = materials.find(m=>m.id===id);
    if(!mat) return;
    savePriceHistory("materials", id, mat.unitPrice, newPrice, memo);
    setMaterials(p=>p.map(m=>m.id===id?{...m,unitPrice:Number(newPrice)}:m));
  };
  const updatePcPrice = (id, newPrice, memo) => {
    const pc = processingCosts.find(p=>p.id===id);
    if(!pc) return;
    savePriceHistory("processing", id, pc.unitPrice, newPrice, memo);
    setProcessingCosts(p=>p.map(x=>x.id===id?{...x,unitPrice:Number(newPrice)}:x));
  };

  // 특정 날짜 기준 단가 조회
  const getPriceAtDate = (kind, id, currentPrice, targetDate) => {
    const hist = ((priceHistory[kind]||{})[id]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    // targetDate 이후 첫 번째 newPrice가 있으면 그 이전 oldPrice
    // targetDate 이하인 가장 마지막 newPrice 반환
    let price = hist.length>0 ? hist[0].oldPrice : currentPrice;
    for(const h of hist){
      if(h.date<=targetDate) price=h.newPrice;
      else break;
    }
    return price;
  };

  // 원가 계산 (현재 단가 기준)
  const calcCost = (cp) => {
    const matCost = (cp.materials||[]).reduce((sum,m)=>{
      const mat = materials.find(x=>x.id===m.materialId);
      return sum + (mat?mat.unitPrice*m.qty:0);
    },0);
    const pcCost = (cp.processing||[]).reduce((sum,p)=>{
      const pc = processingCosts.find(x=>x.id===p.processingId);
      return sum + (pc?pc.unitPrice*p.qty:0);
    },0);
    const total = matCost + pcCost + Number(cp.laborCost||0) + Number(cp.packagingCost||0);
    const salePrice = cp.marginRate>0 ? Math.round(total/(1-Number(cp.marginRate)/100)) : total;
    return {matCost, pcCost, total, salePrice};
  };

  // 완제품 원가 이력 생성 (가격 변동 이벤트 기반)
  const buildCpCostHistory = (cp) => {
    // 관련 원자재/가공비의 모든 변동일 수집
    const dates = new Set([todayStr()]);
    (cp.materials||[]).forEach(m=>{
      ((priceHistory.materials||{})[m.materialId]||[]).forEach(h=>dates.add(h.date));
    });
    (cp.processing||[]).forEach(p=>{
      ((priceHistory.processing||{})[p.processingId]||[]).forEach(h=>dates.add(h.date));
    });
    const sorted = [...dates].sort();
    return sorted.map(date=>{
      const matCost = (cp.materials||[]).reduce((sum,m)=>{
        const mat = materials.find(x=>x.id===m.materialId);
        const price = getPriceAtDate("materials", m.materialId, mat?mat.unitPrice:0, date);
        return sum+(price*m.qty);
      },0);
      const pcCost = (cp.processing||[]).reduce((sum,p)=>{
        const pc = processingCosts.find(x=>x.id===p.processingId);
        const price = getPriceAtDate("processing", p.processingId, pc?pc.unitPrice:0, date);
        return sum+(price*p.qty);
      },0);
      const total = matCost+pcCost+Number(cp.laborCost||0)+Number(cp.packagingCost||0);
      const salePrice = cp.marginRate>0?Math.round(total/(1-Number(cp.marginRate)/100)):total;
      return {date, matCost, pcCost, total, salePrice};
    });
  };

  // ---- 원자재 엑셀 다운로드 ----
  const downloadMatXlsx = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["ID","원자재명","단위","현재단가(원)","회사명","1차카테고리","2차카테고리","3차카테고리"],
      ...materials.map(m=>[m.id,m.name,m.unit,m.unitPrice,m.company||"",m.cat1||"",m.cat2||"",m.cat3||""])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:10},{wch:20},{wch:8},{wch:14},{wch:16},{wch:14},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws,"원자재목록");
    const hdr2=["ID","원자재명","변경일","변경전단가","변경후단가","메모"];
    const rows2=[hdr2];
    materials.forEach(m=>{
      ((priceHistory.materials||{})[m.id]||[]).forEach(h=>{
        rows2.push([m.id,m.name,h.date,h.oldPrice,h.newPrice,h.memo]);
      });
    });
    const ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2["!cols"]=[{wch:10},{wch:18},{wch:12},{wch:14},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws2,"가격변동이력");
    XLSX.writeFile(wb,"원자재목록.xlsx");
  };

  // ---- 원자재 엑셀 업로드 ----
  const uploadMatXlsx = (e) => {
    const file = e.target.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1});
        const newMats = [];
        for(let i=1;i<rows.length;i++){
          const r=rows[i]; if(!r[1])continue;
          newMats.push({id:r[0]||("MAT"+String(Date.now()+i).slice(-5)),name:String(r[1]||""),unit:String(r[2]||"개"),unitPrice:Number(r[3]||0),company:String(r[4]||""),cat1:String(r[5]||""),cat2:String(r[6]||""),cat3:String(r[7]||"")});
        }
        if(newMats.length>0){setMaterials(newMats);alert(newMats.length+"개 원자재를 불러왔습니다.");}
      } catch(err){alert("파일을 읽을 수 없습니다.");}
    };
    reader.readAsBinaryString(file); e.target.value="";
  };

  // ---- 가공비 엑셀 다운로드 ----
  const downloadPcXlsx = () => {
    const wb = XLSX.utils.book_new();
    const rows = [["ID","가공비명","단위","현재단가(원)","회사명","1차카테고리","2차카테고리","3차카테고리"],
      ...processingCosts.map(p=>[p.id,p.name,p.unit,p.unitPrice,p.company||"",p.cat1||"",p.cat2||"",p.cat3||""])];
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"]=[{wch:10},{wch:20},{wch:8},{wch:14},{wch:16},{wch:14},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws,"가공비목록");
    const hdr2=["ID","가공비명","변경일","변경전단가","변경후단가","메모"];
    const rows2=[hdr2];
    processingCosts.forEach(p=>{
      ((priceHistory.processing||{})[p.id]||[]).forEach(h=>{
        rows2.push([p.id,p.name,h.date,h.oldPrice,h.newPrice,h.memo]);
      });
    });
    const ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2["!cols"]=[{wch:10},{wch:18},{wch:12},{wch:14},{wch:14},{wch:20}];
    XLSX.utils.book_append_sheet(wb,ws2,"가격변동이력");
    XLSX.writeFile(wb,"가공비목록.xlsx");
  };

  // ---- 가공비 엑셀 업로드 ----
  const uploadPcXlsx = (e) => {
    const file = e.target.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"binary"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws,{header:1});
        const newPcs = [];
        for(let i=1;i<rows.length;i++){
          const r=rows[i]; if(!r[1])continue;
          newPcs.push({id:r[0]||("PC"+String(Date.now()+i).slice(-5)),name:String(r[1]||""),unit:String(r[2]||"개"),unitPrice:Number(r[3]||0),company:String(r[4]||""),cat1:String(r[5]||""),cat2:String(r[6]||""),cat3:String(r[7]||"")});
        }
        if(newPcs.length>0){setProcessingCosts(newPcs);alert(newPcs.length+"개 가공비를 불러왔습니다.");}
      } catch(err){alert("파일을 읽을 수 없습니다.");}
    };
    reader.readAsBinaryString(file); e.target.value="";
  };

  // ---- 완제품 엑셀 다운로드 ----
  const downloadCpXlsx = () => {
    const wb = XLSX.utils.book_new();
    const hdr = ["ID","완제품명","단위","인건비","포장비","마진율(%)","원자재원가","가공비","총원가","판매가"];
    const rows = [hdr,...costProducts.map(cp=>{
      const {matCost,pcCost,total,salePrice}=calcCost(cp);
      return [cp.id,cp.name,cp.unit,cp.laborCost,cp.packagingCost,cp.marginRate,matCost,pcCost,total,salePrice];
    })];
    const ws1 = XLSX.utils.aoa_to_sheet(rows);
    ws1["!cols"]=[{wch:10},{wch:18},{wch:7},{wch:10},{wch:8},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws1,"완제품원가");
    // 원자재 구성
    const hdr2=["완제품ID","완제품명","구분","항목ID","항목명","단위","수량","단가","소계"];
    const rows2=[hdr2];
    costProducts.forEach(cp=>{
      (cp.materials||[]).forEach(m=>{
        const mat=materials.find(x=>x.id===m.materialId);
        rows2.push([cp.id,cp.name,"원자재",m.materialId,mat?mat.name:"",mat?mat.unit:"",m.qty,mat?mat.unitPrice:0,(mat?mat.unitPrice:0)*m.qty]);
      });
      (cp.processing||[]).forEach(p=>{
        const pc=processingCosts.find(x=>x.id===p.processingId);
        rows2.push([cp.id,cp.name,"가공비",p.processingId,pc?pc.name:"",pc?pc.unit:"",p.qty,pc?pc.unitPrice:0,(pc?pc.unitPrice:0)*p.qty]);
      });
    });
    const ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2["!cols"]=[{wch:10},{wch:18},{wch:7},{wch:10},{wch:18},{wch:7},{wch:7},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws2,"구성항목");
    // 원가변동이력
    const hdr3=["완제품ID","완제품명","기준일","원자재비","가공비","총원가","판매가"];
    const rows3=[hdr3];
    costProducts.forEach(cp=>{
      buildCpCostHistory(cp).forEach(h=>{
        rows3.push([cp.id,cp.name,h.date,h.matCost,h.pcCost,h.total,h.salePrice]);
      });
    });
    const ws3=XLSX.utils.aoa_to_sheet(rows3);
    ws3["!cols"]=[{wch:10},{wch:18},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws3,"원가변동이력");
    XLSX.writeFile(wb,"원가계산.xlsx");
  };

  // ---- 완제품 엑셀 업로드 ----
  const uploadCpXlsx = (e) => {
    const file = e.target.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, {type:"binary"});
        const ws1 = wb.Sheets[wb.SheetNames[0]];
        const rows1 = XLSX.utils.sheet_to_json(ws1,{header:1});
        const ws2 = wb.SheetNames[1]?wb.Sheets[wb.SheetNames[1]]:null;
        const compRows = ws2?XLSX.utils.sheet_to_json(ws2,{header:1}).slice(1):[];
        const cpMatMap={}, cpPcMap={};
        compRows.forEach(r=>{
          if(!r[0])return;
          const cpId=String(r[0]), kind=String(r[2]||""), itemId=String(r[3]||""), qty=Number(r[6]||1);
          if(kind==="원자재"){if(!cpMatMap[cpId])cpMatMap[cpId]=[];if(itemId)cpMatMap[cpId].push({materialId:itemId,qty});}
          else if(kind==="가공비"){if(!cpPcMap[cpId])cpPcMap[cpId]=[];if(itemId)cpPcMap[cpId].push({processingId:itemId,qty});}
        });
        const newCps=[];
        for(let i=1;i<rows1.length;i++){
          const r=rows1[i]; if(!r[1])continue;
          const id=String(r[0]||("CP"+String(Date.now()+i).slice(-5)));
          newCps.push({id,name:String(r[1]),unit:String(r[2]||"개"),laborCost:Number(r[3]||0),packagingCost:Number(r[4]||0),marginRate:Number(r[5]||0),materials:cpMatMap[id]||[],processing:cpPcMap[id]||[]});
        }
        if(newCps.length>0){setCostProducts(newCps);alert(newCps.length+"개 완제품을 불러왔습니다.");}
      } catch(err){alert("파일을 읽을 수 없습니다.");}
    };
    reader.readAsBinaryString(file); e.target.value="";
  };

  const genMatId = () => "MAT"+String(materials.length+1).padStart(3,"0");
  const genPcId  = () => "PC"+String(processingCosts.length+1).padStart(3,"0");
  const genCpId  = () => "CP"+String(costProducts.length+1).padStart(3,"0");

  const S2 = {
    tab: (active) => ({padding:"8px 18px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,
      background:active?"#1a237e":"#f0f0f0",color:active?"#fff":"#555",marginRight:6}),
    addBtn: {background:"#1a237e",color:"#fff",border:"none",borderRadius:6,padding:"7px 14px",cursor:"pointer",fontWeight:600,fontSize:13,display:"flex",alignItems:"center",gap:5},
    xlsBtn: (c) => ({background:c||"#43a047",color:"#fff",border:"none",borderRadius:6,padding:"7px 12px",cursor:"pointer",fontWeight:600,fontSize:12,display:"flex",alignItems:"center",gap:4}),
    inp: {padding:"6px 9px",borderRadius:6,border:"1px solid #ddd",fontSize:13,width:"100%",boxSizing:"border-box"},
    td: {padding:"8px 10px",borderBottom:"1px solid #f0f0f0",fontSize:13,verticalAlign:"middle"},
    th: {padding:"8px 10px",fontWeight:700,fontSize:12,color:"#555",background:"#f8f9ff",borderBottom:"2px solid #e0e4f0",whiteSpace:"nowrap"},
    iconBtn: (c) => ({background:"none",border:"none",cursor:"pointer",color:c||"#1a237e",padding:"3px 5px",fontSize:12}),
    badge: (c) => ({display:"inline-block",padding:"2px 8px",borderRadius:10,background:c+"18",color:c,fontSize:11,fontWeight:600}),
  };

  // ---- 가격 변동 입력 공통 컴포넌트 ----
  const PriceChangeRow = ({kind, item, histOpen, setHistOpen}) => {
    const hist = ((priceHistory[kind]||{})[item.id]||[]);
    const [newPrice, setNewPrice] = useState("");
    const [memo, setMemo] = useState("");
    const updateFn = kind==="materials" ? updateMatPrice : updatePcPrice;
    return (
      <div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginTop:4}}>
          <input style={{...S2.inp,width:110}} type="number" placeholder="새 단가 입력" value={newPrice} onChange={e=>setNewPrice(e.target.value)}/>
          <input style={{...S2.inp,flex:1}} placeholder="변경 사유 (선택)" value={memo} onChange={e=>setMemo(e.target.value)}/>
          <button style={{...S2.addBtn,padding:"5px 10px",fontSize:12,background:"#e65100"}} onClick={()=>{
            if(!newPrice||Number(newPrice)===item.unitPrice){alert("다른 단가를 입력하세요.");return;}
            if(window.confirm(`단가를 ${fmt(item.unitPrice)}원 → ${fmt(Number(newPrice))}원으로 변경할까요?`)){
              updateFn(item.id, newPrice, memo);
              setNewPrice(""); setMemo("");
            }
          }}>변경</button>
          <button style={{...S2.iconBtn("#1565c0"),fontSize:12}} onClick={()=>setHistOpen(histOpen===item.id?null:item.id)}>
            이력 {hist.length>0?`(${hist.length})`:""} {histOpen===item.id?"▲":"▼"}
          </button>
        </div>
        {histOpen===item.id && (
          <div style={{marginTop:6,background:"#f8f9ff",borderRadius:6,padding:"8px 10px"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#555",marginBottom:6}}>가격변동 이력</div>
            {hist.length===0 ? <div style={{fontSize:12,color:"#aaa"}}>변동 이력이 없습니다.</div> :
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr>
                  <th style={{...S2.th,padding:"4px 6px"}}>날짜</th>
                  <th style={{...S2.th,padding:"4px 6px",textAlign:"right"}}>변경 전</th>
                  <th style={{...S2.th,padding:"4px 6px",textAlign:"right"}}>변경 후</th>
                  <th style={{...S2.th,padding:"4px 6px",textAlign:"right"}}>증감</th>
                  <th style={{...S2.th,padding:"4px 6px"}}>사유</th>
                </tr></thead>
                <tbody>
                  {[...hist].reverse().map((h,i)=>{
                    const diff = h.newPrice - h.oldPrice;
                    return (<tr key={i}>
                      <td style={{...S2.td,padding:"4px 6px"}}>{h.date}</td>
                      <td style={{...S2.td,padding:"4px 6px",textAlign:"right"}}>{fmt(h.oldPrice)}</td>
                      <td style={{...S2.td,padding:"4px 6px",textAlign:"right",fontWeight:600}}>{fmt(h.newPrice)}</td>
                      <td style={{...S2.td,padding:"4px 6px",textAlign:"right",color:diff>0?"#c62828":"#2e7d32",fontWeight:600}}>{diff>0?"+":""}{fmt(diff)}</td>
                      <td style={{...S2.td,padding:"4px 6px",color:"#888"}}>{h.memo||"-"}</td>
                    </tr>);
                  })}
                </tbody>
              </table>
            }
          </div>
        )}
      </div>
    );
  };

  // ---- 카테고리 트리 뷰 컴포넌트 ----
  const CategoryTreeView = ({items, catOpen, setCatOpen, catCmpView, setCatCmpView}) => {
    const tree = {};
    items.forEach(it => {
      const c1 = it.cat1||"(미분류)";
      const c2 = it.cat2||"(미분류)";
      if(!tree[c1]) tree[c1] = {};
      if(!tree[c1][c2]) tree[c1][c2] = [];
      tree[c1][c2].push(it);
    });
    const toggle = (key) => setCatOpen(p=>({...p,[key]:!p[key]}));
    const toggleCmp = (key) => setCatCmpView(p=>({...p,[key]:!p[key]}));
    if(Object.keys(tree).length===0) return <div style={{...S.card,padding:20,textAlign:"center",color:"#aaa"}}>카테고리가 설정된 항목이 없습니다. 목록 보기에서 1차/2차 카테고리를 입력하세요.</div>;
    return (
      <div>
        {Object.entries(tree).map(([c1, c2map]) => {
          const allCount = Object.values(c2map).reduce((s,v)=>s+v.length,0);
          const c1open = catOpen[c1];
          return (
            <div key={c1} style={{marginBottom:8}}>
              <div onClick={()=>toggle(c1)} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:"linear-gradient(90deg,#1a237e,#283593)",color:"#fff",borderRadius:8,cursor:"pointer",userSelect:"none"}}>
                <span style={{fontSize:14}}>{c1open?"▼":"▶"}</span>
                <span style={{fontWeight:700,fontSize:16,flex:1}}>{c1}</span>
                <span style={{fontSize:12,opacity:0.75,background:"rgba(255,255,255,0.15)",padding:"2px 8px",borderRadius:10}}>{allCount}개</span>
              </div>
              {c1open && (
                <div style={{marginLeft:16,marginTop:4}}>
                  {Object.entries(c2map).map(([c2, citems]) => {
                    const c2key = c1+"||"+c2;
                    const c2open = catOpen[c2key];
                    const showCmp = catCmpView[c2key];
                    const byCompany = {};
                    citems.forEach(it => {
                      const co = it.company||"(회사 미등록)";
                      if(!byCompany[co]) byCompany[co]=[];
                      byCompany[co].push(it);
                    });
                    const hasCat3 = citems.some(it=>it.cat3);
                    return (
                      <div key={c2} style={{marginBottom:5,border:"1px solid #e0e4f0",borderRadius:7,overflow:"hidden"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 14px",background:"#f0f4ff",cursor:"pointer",userSelect:"none"}} onClick={()=>toggle(c2key)}>
                          <span style={{color:"#1a237e",fontSize:13}}>{c2open?"▼":"▶"}</span>
                          <span style={{fontWeight:600,flex:1,color:"#1a237e",fontSize:14}}>{c2}</span>
                          <span style={{fontSize:11,color:"#888"}}>{citems.length}개</span>
                          <button style={{background:showCmp?"#1a237e":"#fff",color:showCmp?"#fff":"#1a237e",border:"1px solid #1a237e",borderRadius:5,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}
                            onClick={(e)=>{e.stopPropagation();toggleCmp(c2key);}}>
                            🏢 회사별 단가
                          </button>
                        </div>
                        {showCmp && (
                          <div style={{padding:"10px 14px",background:"#fff",borderTop:"1px solid #e8eaf0"}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#1a237e",marginBottom:8}}>📊 회사별 단가 비교 — {c1} &gt; {c2}</div>
                            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                              <thead><tr>
                                <th style={S2.th}>회사명</th>
                                <th style={S2.th}>항목명</th>
                                {hasCat3&&<th style={S2.th}>3차 분류</th>}
                                <th style={{...S2.th,textAlign:"right"}}>단가</th>
                                <th style={S2.th}>단위</th>
                              </tr></thead>
                              <tbody>
                                {Object.entries(byCompany).map(([co,coItems],ci)=>
                                  coItems.map((it,ii)=>(
                                    <tr key={it.id} style={{background:ci%2===0?"#fff":"#f8f9ff"}}>
                                      {ii===0&&<td style={{...S2.td,fontWeight:700,verticalAlign:"top",borderRight:"2px solid #e0e4f0",color:"#1565c0"}} rowSpan={coItems.length}>{co}</td>}
                                      <td style={S2.td}>{it.name}</td>
                                      {hasCat3&&<td style={{...S2.td,color:"#888"}}>{it.cat3||"-"}</td>}
                                      <td style={{...S2.td,textAlign:"right",fontWeight:700,color:"#c62828",fontSize:13}}>{fmt(it.unitPrice)}원</td>
                                      <td style={{...S2.td,color:"#888"}}>{it.unit}</td>
                                    </tr>
                                  ))
                                )}
                              </tbody>
                            </table>
                          </div>
                        )}
                        {c2open && (
                          <div style={{padding:"8px 14px"}}>
                            {citems.map(it=>(
                              <div key={it.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f4f5f7"}}>
                                <span style={{fontSize:11,color:"#aaa",minWidth:55}}>{it.id}</span>
                                <span style={{flex:1,fontWeight:600,fontSize:13}}>{it.name}</span>
                                {it.cat3&&<span style={{fontSize:11,color:"#6a1b9a",background:"#f3e5f5",padding:"1px 7px",borderRadius:10}}>{it.cat3}</span>}
                                {it.company&&<span style={{fontSize:11,color:"#1565c0",background:"#e3f2fd",padding:"1px 7px",borderRadius:10}}>🏢 {it.company}</span>}
                                <span style={{fontWeight:700,color:"#1565c0",minWidth:70,textAlign:"right"}}>{fmt(it.unitPrice)}원</span>
                                <span style={{fontSize:12,color:"#888"}}>{it.unit}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  // 원자재/가공비 공통 목록 렌더러
  const renderItemList = ({items, setItems, form, setForm, editId, setEditId, editForm, setEditForm,
    histOpen, setHistOpen, viewMode, setViewMode, catOpen, setCatOpen, catCmpView, setCatCmpView,
    kind, genId, uploadFn, downloadFn, title, idPrefix, dragIdx, setDragIdx, dragOverIdx, setDragOverIdx}) => (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <h3 style={{fontSize:16,fontWeight:700,color:"#1a1a2e",flex:1}}>{title}</h3>
        <div style={{display:"flex",gap:3,background:"#f0f0f0",borderRadius:7,padding:3}}>
          <button style={{padding:"5px 12px",borderRadius:5,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,
            background:viewMode==="list"?"#1a237e":"transparent",color:viewMode==="list"?"#fff":"#555"}}
            onClick={()=>setViewMode("list")}>📋 목록</button>
          <button style={{padding:"5px 12px",borderRadius:5,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,
            background:viewMode==="category"?"#1a237e":"transparent",color:viewMode==="category"?"#fff":"#555"}}
            onClick={()=>setViewMode("category")}>🗂️ 카테고리</button>
        </div>
        <label style={S2.xlsBtn("#1565c0")}><Upload size={13}/> 엑셀 업로드<input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={uploadFn}/></label>
        <button style={S2.xlsBtn("#43a047")} onClick={downloadFn}><Download size={13}/> 엑셀 다운로드</button>
      </div>
      {viewMode==="category" ? (
        <CategoryTreeView items={items} catOpen={catOpen} setCatOpen={setCatOpen} catCmpView={catCmpView} setCatCmpView={setCatCmpView}/>
      ) : (<>
      {/* 신규 추가 행 */}
      <div style={{...S.card,padding:12,marginBottom:10,background:"#f0f4ff"}}>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
          <input style={{...S2.inp,width:90}} placeholder={genId()} value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value}))} maxLength={10}/>
          <input style={{...S2.inp,flex:2,minWidth:120}} placeholder="이름*" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
          <input style={{...S2.inp,width:60}} placeholder="단위" value={form.unit} onChange={e=>setForm(p=>({...p,unit:e.target.value}))}/>
          <input style={{...S2.inp,width:110}} type="number" placeholder="단가(원)*" value={form.unitPrice} onChange={e=>setForm(p=>({...p,unitPrice:e.target.value}))}/>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <select style={{...S2.inp,flex:1,minWidth:110}} value={form.companyId||""} onChange={e=>setForm(p=>({...p,companyId:e.target.value}))}>
            <option value="">🏢 회사 선택</option>
            {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {(()=>{
            const selCat = categories.find(c=>c.id===form.catId)||{};
            const c1list = [...new Set(categories.map(c=>c.cat1))].filter(Boolean);
            const c2list = selCat.cat1 ? [...new Set(categories.filter(c=>c.cat1===selCat.cat1).map(c=>c.cat2))].filter(Boolean) : [];
            const c3list = (selCat.cat1&&selCat.cat2) ? [...new Set(categories.filter(c=>c.cat1===selCat.cat1&&c.cat2===selCat.cat2).map(c=>c.cat3))].filter(Boolean) : [];
            const handleC1 = (v) => setForm(p=>({...p,catId: categories.find(c=>c.cat1===v&&!c.cat2)?.id || categories.find(c=>c.cat1===v)?.id || "", _c1sel:v}));
            const handleC2 = (v) => { const found=categories.find(c=>c.cat1===(selCat.cat1||form._c1sel)&&c.cat2===v); setForm(p=>({...p,catId:found?found.id:"",_c1sel:selCat.cat1||p._c1sel})); };
            const handleC3 = (v) => { const found=categories.find(c=>c.cat1===selCat.cat1&&c.cat2===selCat.cat2&&c.cat3===v); if(found) setForm(p=>({...p,catId:found.id})); };
            return (<>
              <select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat1||form._c1sel||""} onChange={e=>handleC1(e.target.value)}>
                <option value="">1차 카테고리</option>
                {c1list.map(v=><option key={v} value={v}>{v}</option>)}
              </select>
              {(selCat.cat1||form._c1sel) && <select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat2||""} onChange={e=>handleC2(e.target.value)}>
                <option value="">2차 카테고리</option>
                {c2list.map(v=><option key={v} value={v}>{v}</option>)}
              </select>}
              {selCat.cat2 && c3list.length>0 && <select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat3||""} onChange={e=>handleC3(e.target.value)}>
                <option value="">3차 카테고리</option>
                {c3list.map(v=><option key={v} value={v}>{v}</option>)}
              </select>}
            </>);
          })()}
          <button style={{...S2.addBtn,padding:"7px 14px",whiteSpace:"nowrap"}} onClick={()=>{
            if(!form.name||!form.unitPrice){alert("이름과 단가를 입력하세요.");return;}
            const id=form.id||genId();
            if(items.find(x=>x.id===id)){alert("같은 ID가 이미 있습니다.");return;}
            const cat=categories.find(c=>c.id===form.catId)||{};
            const comp=companies.find(c=>c.id===form.companyId);
            setItems(p=>[...p,{id,name:form.name,unit:form.unit||"개",unitPrice:Number(form.unitPrice),
              companyId:form.companyId||"",company:comp?comp.name:"",
              catId:form.catId||"",cat1:cat.cat1||"",cat2:cat.cat2||"",cat3:cat.cat3||""}]);
            setForm({id:"",name:"",unit:"",unitPrice:"",companyId:"",catId:"",_c1sel:""});
          }}>+ 추가</button>
        </div>
        {categories.length===0&&<div style={{marginTop:6,fontSize:12,color:"#e65100"}}>⚠️ 카테고리가 없습니다. <button style={{background:"none",border:"none",color:"#1565c0",cursor:"pointer",fontWeight:600,fontSize:12}} onClick={()=>setTab("catmgmt")}>카테고리/회사 관리</button>에서 먼저 추가하세요.</div>}
      </div>
      {/* 목록 */}
      {items.length===0&&<div style={{...S.card,padding:20,textAlign:"center",color:"#aaa"}}>등록된 항목이 없습니다.</div>}
      {items.map((item,idx)=>(
        <div key={item.id}
          draggable
          onDragStart={e=>{e.dataTransfer.effectAllowed="move";setDragIdx(idx);}}
          onDragOver={e=>{e.preventDefault();e.dataTransfer.dropEffect="move";if(dragOverIdx!==idx)setDragOverIdx(idx);}}
          onDrop={e=>{e.preventDefault();if(dragIdx==null||dragIdx===idx){setDragIdx(null);setDragOverIdx(null);return;}const arr=[...items];const[m]=arr.splice(dragIdx,1);arr.splice(idx,0,m);setItems(arr);setDragIdx(null);setDragOverIdx(null);}}
          onDragEnd={()=>{setDragIdx(null);setDragOverIdx(null);}}
          style={{...S.card,marginBottom:8,padding:0,overflow:"hidden",opacity:dragIdx===idx?0.4:1,outline:dragOverIdx===idx&&dragIdx!==idx?"2px dashed #1a237e":"none",transition:"opacity 0.15s"}}>
          <div style={{padding:"10px 14px",background:"#f8f9ff"}}>
            {editId===item.id ? (
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
                  <span style={{fontSize:11,color:"#888",minWidth:60}}>{item.id}</span>
                  <input style={{...S2.inp,flex:2}} value={editForm.name||""} onChange={e=>setEditForm(p=>({...p,name:e.target.value}))}/>
                  <input style={{...S2.inp,width:60}} value={editForm.unit||""} onChange={e=>setEditForm(p=>({...p,unit:e.target.value}))}/>
                  <button style={S2.iconBtn("#2e7d32")} onClick={()=>{
                    const cat=categories.find(c=>c.id===editForm.catId)||{};
                    const comp=companies.find(c=>c.id===editForm.companyId);
                    setItems(p=>p.map(x=>x.id===item.id?{...x,name:editForm.name,unit:editForm.unit,
                      companyId:editForm.companyId||"",company:comp?comp.name:"",
                      catId:editForm.catId||"",cat1:cat.cat1||"",cat2:cat.cat2||"",cat3:cat.cat3||""}:x));
                    setEditId(null);
                  }}>✔저장</button>
                  <button style={S2.iconBtn("#999")} onClick={()=>setEditId(null)}>✖</button>
                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <select style={{...S2.inp,flex:1,minWidth:110}} value={editForm.companyId||""} onChange={e=>setEditForm(p=>({...p,companyId:e.target.value}))}>
                    <option value="">🏢 회사 선택</option>
                    {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                  {(()=>{
                    const selCat=categories.find(c=>c.id===editForm.catId)||{};
                    const c1list=[...new Set(categories.map(c=>c.cat1))].filter(Boolean);
                    const c2list=selCat.cat1?[...new Set(categories.filter(c=>c.cat1===selCat.cat1).map(c=>c.cat2))].filter(Boolean):[];
                    const c3list=(selCat.cat1&&selCat.cat2)?[...new Set(categories.filter(c=>c.cat1===selCat.cat1&&c.cat2===selCat.cat2).map(c=>c.cat3))].filter(Boolean):[];
                    const handleC1e=(v)=>setEditForm(p=>({...p,catId:categories.find(c=>c.cat1===v)?.id||"",_ec1:v}));
                    const handleC2e=(v)=>{const f=categories.find(c=>c.cat1===(selCat.cat1||editForm._ec1)&&c.cat2===v);setEditForm(p=>({...p,catId:f?f.id:""}));};
                    const handleC3e=(v)=>{const f=categories.find(c=>c.cat1===selCat.cat1&&c.cat2===selCat.cat2&&c.cat3===v);if(f)setEditForm(p=>({...p,catId:f.id}));};
                    return (<>
                      <select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat1||editForm._ec1||""} onChange={e=>handleC1e(e.target.value)}>
                        <option value="">1차 카테고리</option>
                        {c1list.map(v=><option key={v} value={v}>{v}</option>)}
                      </select>
                      {(selCat.cat1||editForm._ec1)&&<select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat2||""} onChange={e=>handleC2e(e.target.value)}>
                        <option value="">2차 카테고리</option>
                        {c2list.map(v=><option key={v} value={v}>{v}</option>)}
                      </select>}
                      {selCat.cat2&&c3list.length>0&&<select style={{...S2.inp,flex:1,minWidth:90}} value={selCat.cat3||""} onChange={e=>handleC3e(e.target.value)}>
                        <option value="">3차 카테고리</option>
                        {c3list.map(v=><option key={v} value={v}>{v}</option>)}
                      </select>}
                    </>);
                  })()}
                </div>
              </div>
            ) : (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{cursor:"grab",color:"#ccc",fontSize:18,userSelect:"none",lineHeight:1}} title="드래그로 순서 변경">⠿</span>
                  <span style={{fontSize:11,color:"#888",minWidth:60}}>{item.id}</span>
                  <span style={{fontWeight:700,flex:2,minWidth:100}}>{item.name}</span>
                  <span style={{color:"#888",fontSize:12}}>{item.unit}</span>
                  <span style={{fontWeight:700,color:"#1565c0",minWidth:80,textAlign:"right"}}>{fmt(item.unitPrice)}원</span>
                  <button style={S2.iconBtn("#1565c0")} onClick={()=>{setEditId(item.id);setEditForm({name:item.name,unit:item.unit,companyId:item.companyId||"",catId:item.catId||""});}}>편집</button>
                  <button style={S2.iconBtn("#c62828")} onClick={()=>{if(window.confirm("삭제할까요?"))setItems(p=>p.filter(x=>x.id!==item.id));}}>삭제</button>
                </div>
                <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                  {item.company&&<span style={{fontSize:11,color:"#1565c0",background:"#e3f2fd",padding:"1px 8px",borderRadius:10}}>🏢 {item.company}</span>}
                  {item.cat1&&<span style={{fontSize:11,color:"#555",background:"#f4f5f7",padding:"1px 8px",borderRadius:10}}>{item.cat1}</span>}
                  {item.cat2&&<span style={{fontSize:11,color:"#555",background:"#f4f5f7",padding:"1px 8px",borderRadius:10,borderLeft:"2px solid #1a237e"}}>▶ {item.cat2}</span>}
                  {item.cat3&&<span style={{fontSize:11,color:"#6a1b9a",background:"#f3e5f5",padding:"1px 8px",borderRadius:10,borderLeft:"2px solid #6a1b9a"}}>▶▶ {item.cat3}</span>}
                </div>
              </div>
            )}
          </div>
          <div style={{padding:"6px 14px 10px"}}>
            <PriceChangeRow kind={kind} item={item} histOpen={histOpen} setHistOpen={setHistOpen}/>
          </div>
